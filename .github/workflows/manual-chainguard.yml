name: Manual Push Docker Hub Image (Chainguard Fork)

on:
  pull_request: 
    branches: [ "main", "add-linux-arm-support" ]
  workflow_dispatch:
    inputs:
      nginx_tag:
        description: 'NGINX Ingress Tag'
        required: true
        default: 'v1.15.6'
      module_tag:
        description: 'Fastly Module Tag'
        required: true
        default: '1.4.0'

permissions:
  contents: read

# Set up global environment variables with fallbacks for PR runs
env:
  NGINX_TAG: ${{ github.event.inputs.nginx_tag || 'v1.15.6' }}
  MODULE_TAG: ${{ github.event.inputs.module_tag || '1.4.0' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      # 1. Checkout module repository
      - name: Checkout Fastly Repository
        uses: actions/checkout@v5
        with:
          path: 'fastly-module'

      # 2. Checkout the Chainguard fork
      - name: Checkout Chainguard Fork
        uses: actions/checkout@v5
        with:
          repository: 'chainguard-forks/ingress-nginx'
          ref: 'controller-${{ env.NGINX_TAG }}'
          path: 'ingress-nginx-fork'

      # 3. Set up QEMU and Buildx
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."localhost:5000"]
              http = true
              insecure = true

      # 4. Build the Chainguard Base Image for both architectures
      - name: Build Chainguard Controller Image
        run: |
          cd ingress-nginx-fork
          
          # Build and push AMD64 base image
          make build ARCH=amd64
          make image ARCH=amd64 REGISTRY=localhost:5000/local-chainguard-ingress TAG=${{ env.NGINX_TAG }}-amd64
          docker push localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }}-amd64

          # Build and push ARM64 base image
          make build ARCH=arm64
          make image ARCH=arm64 REGISTRY=localhost:5000/local-chainguard-ingress TAG=${{ env.NGINX_TAG }}-arm64
          docker push localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }}-arm64

          # Create and push multi-arch manifest list in local registry
          docker manifest create --insecure localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }} \
            localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }}-amd64 \
            localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }}-arm64

          # Explicitly annotate platform architectures because local builds default to the host architecture metadata (amd64)
          docker manifest annotate localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }} \
            localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }}-amd64 --os linux --arch amd64
          docker manifest annotate localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }} \
            localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }}-arm64 --os linux --arch arm64

          docker manifest push --insecure localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }}

      # 5. Login to Docker Hub (Only needed if we are pushing)
      - name: Login to Docker Hub
        # Skip this step on automated PR runs to protect your credentials
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_API_TOKEN }}

      # 6. Build and conditionally Push the Fastly Image
      - name: Build and Push image to Docker Hub
        env:
          REPO: signalsciences/sigsci-nginx-ingress-controller-chainguard
        run: |
          cd fastly-module
          
          # Always build the image (proves the code compiles on the PR)
          # Build as multi-arch (amd64 and arm64) using Docker Buildx and the local base image
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual run detected. Pushing to Docker Hub..."
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg PKGNAME=nginx-module-sigsci-nxo \
              --build-arg LOCAL_CHAINGUARD_IMAGE=localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }} \
              --tag ${REPO}:${{ env.NGINX_TAG }}-fastly${{ env.MODULE_TAG }} \
              --tag ${REPO}:latest \
              --push -f Dockerfile.chainguard .
          else
            echo "Automated PR run detected. Skipping Docker push to protect 'latest' tag."
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg PKGNAME=nginx-module-sigsci-nxo \
              --build-arg LOCAL_CHAINGUARD_IMAGE=localhost:5000/local-chainguard-ingress/controller:${{ env.NGINX_TAG }} \
              -f Dockerfile.chainguard .
          fi